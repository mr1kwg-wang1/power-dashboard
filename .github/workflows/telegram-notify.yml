name: 전력월보 갱신 알림 (텔레그램)

on:
  push:
    branches: [ main ]
    paths:
      - 'data.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 최신 월 데이터 추출 및 메시지 생성
        id: build_message
        run: |
          python3 << 'PYEOF'
          import json, os

          with open('data.json', encoding='utf-8') as f:
              data = json.load(f)

          months = sorted(data['months'], key=lambda m: m['month'])
          last = months[-1]
          prev = months[-2] if len(months) > 1 else None

          def fmt(n, d=0):
              return f"{n:,.{d}f}" if n is not None else "-"

          def delta_line(label, cur, prv, unit="", decimals=2, lower_is_good=True):
              if cur is None:
                  return ""
              if prv is None:
                  return f"· {label}: {fmt(cur, decimals)}{unit}"
              diff = cur - prv
              pct = (diff / prv * 100) if prv else 0
              arrow = "🔺" if diff > 0 else ("🔻" if diff < 0 else "➖")
              return f"· {label}: {fmt(cur, decimals)}{unit} ({arrow} {abs(pct):.1f}% 전월대비)"

          lines = []
          lines.append(f"⚡ *단양공장 전력월보 갱신 알림*")
          lines.append(f"📅 {last['month']}")
          lines.append("")
          lines.append(delta_line("총 원단위", last['total']['unit_kwh_t'], prev['total']['unit_kwh_t'] if prev else None, " kWh/t"))
          lines.append(delta_line("총 사용량", last['total']['usage_kwh'], prev['total']['usage_kwh'] if prev else None, " kWh", 0))
          lines.append(delta_line("전력단가", last['rate'].get('unit_price_won_per_kwh'), prev['rate'].get('unit_price_won_per_kwh') if prev else None, " 원/kWh"))
          lines.append(delta_line("PEAK 전력", last['rate'].get('peak_mid_kw'), prev['rate'].get('peak_mid_kw') if prev else None, " kW", 0))
          lines.append("")
          lines.append("공정별 원단위 (kWh/t)")
          proc_labels = {"RM": "R/M", "COM": "COM", "KL": "K/L", "CM": "C/M"}
          for k, label in proc_labels.items():
              v = last['processes'].get(k, {}).get('unit_kwh_t')
              lines.append(f"· {label}: {fmt(v, 2)}")
          lines.append("")
          lines.append("🔗 https://mr1kwg-wang1.github.io/power-dashboard/")

          message = "\n".join([l for l in lines if l is not None])

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write("message<<EOF\n")
              out.write(message)
              out.write("\nEOF\n")
          PYEOF

      - name: 텔레그램 발송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE: ${{ steps.build_message.outputs.message }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            --data-urlencode text="${MESSAGE}"
